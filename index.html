<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta id="viewportMeta" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
    <title>OLANA 嚴選代購</title>
    <style>
        /* ================= 變數與主題 ================= */
        body.theme-kr {
            --brand-primary: #B5835A;   
            --brand-primary-hover: #966A45; 
            --brand-bg: #C9A494;        
            --brand-text: #4A4036;      
            --brand-accent: #C06C5B;    
            --box-shadow: 0 5px 15px rgba(181, 131, 90, 0.15); 
        }

        /* ================= 共用基礎 ================= */
        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background-color: var(--brand-bg); 
            display: flex; justify-content: center; align-items: flex-start;
            padding: 20px; color: var(--brand-text); margin: 0; overflow-x: hidden;
            transition: background-color 0.3s ease;
        }

        .app-container { display: none; width: 100%; }
        .app-container.active { display: block; }

        .view-switch-btn {
            position: fixed; right: 20px; top: 20px; height: 45px;      
            display: flex; align-items: center; justify-content: center;
            background-color: #f5f5f5; color: #666666; border: 1px solid #dcdcdc; 
            padding: 0 16px; border-radius: 25px; font-size: 14px; font-weight: bold;
            cursor: pointer; z-index: 1000; transition: all 0.3s ease; box-sizing: border-box;
        }
        .view-switch-btn.top-hidden { opacity: 0; visibility: hidden; transform: translateY(-50px); }

        .toggle-sidebar-btn {
            position: fixed; left: 20px; top: 20px; height: 45px; width: 45px;  
            background-color: var(--brand-primary); color: white; border: none;
            border-radius: 50%; cursor: pointer; font-size: 18px; z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease;
        }
        .toggle-sidebar-btn.hidden { opacity: 0; visibility: hidden; transform: scale(0.5); }
        .toggle-sidebar-btn.scroll-hidden { opacity: 0; visibility: hidden; transform: translateY(-100px); }

        @media (max-width: 900px) {
            .toggle-sidebar-btn, .view-switch-btn { top: 15px; height: 36px; }
            .toggle-sidebar-btn { width: 36px; left: 15px; }
            .view-switch-btn { right: 15px; padding: 0 12px; font-size: 13px; }
        }

        .page-layout { display: flex; width: 100%; align-items: flex-start; justify-content: center; }
        .sidebar-spacer { width: 0; transition: width 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); flex-shrink: 0; }
        .sidebar-spacer.open { width: 370px; }
        @media (max-width: 900px) { .sidebar-spacer.open { width: 0 !important; } }

        /* ================= 記事本樣式 ================= */
        .sidebar {
            background: #ffffff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 350px; max-width: 85vw; padding: 25px; 
            opacity: 0; visibility: hidden; transform: translateX(-110%); 
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); box-sizing: border-box;
            display: flex; flex-direction: column; position: fixed; left: 20px; top: 20px; 
            z-index: 99999; max-height: calc(100vh - 40px); 
        }
        .sidebar.open { opacity: 1; visibility: visible; transform: translateX(0); }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px dashed #E0D8D0; padding-bottom: 20px; margin-bottom: 20px; }
        .sidebar-header h3 { margin: 0; font-size: 18px; color: #4A4036; font-weight: bold; }
        .close-btn { cursor: pointer; color: var(--brand-primary); font-size: 20px; }
        .saved-list-container { flex: 1; overflow-y: auto; }
        
        .editable-text { outline: none; padding: 2px 4px; border-radius: 4px; transition: background 0.2s; }
        .editable-text:focus { background: #f0f0f0; border-bottom: 1px dashed var(--brand-primary); }
        
        /* 調整卡片內部佈局 */
        .saved-item { background: #FCFAFA; border: 1px solid #E0D8D0; border-radius: 12px; padding: 15px; margin-bottom: 15px; position: relative; display: flex; align-items: flex-start; gap: 12px; box-sizing: border-box; }
        .item-content { flex: 1; display: flex; flex-direction: column; gap: 6px; text-align: left; overflow: hidden; }
        
        /* 報價名稱列 */
        .item-title-row { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 10px; width: 100%; }
        .quote-name { font-size: 14px !important; color: #4A4036; flex: 1; min-width: 120px; word-break: break-all; font-weight: bold; }
        
        /* 價格列佈局：確保成本與賣價上下切齊 */
        .item-price-row { display: flex; flex-direction: column; gap: 4px; }
        .quote-cost { font-size: 14px; color: #9A8C7F; display: block; }
        
        /* 賣價與利潤在同一行 */
        .sell-profit-group { display: flex; align-items: center; gap: 12px; }
        .quote-total { font-size: 16px; color: var(--brand-primary); font-weight: bold; }
        
        /* 利潤欄位樣式 */
        .quote-profit-label { font-size: 16px; color: #666; font-weight: normal; }
        .quote-profit-val { font-size: 16px; color: #2e7d32; font-weight: bold; }

        /* 按鈕群組 */
        .item-action-btns { display: flex; gap: 8px; flex-shrink: 0; margin-left: auto; }
        .copy-btn, .del-btn { cursor: pointer; font-size: 16px; transition: opacity 0.2s; }
        .copy-btn { color: #D5C9BE; }
        .del-btn { color: var(--brand-primary); }
        
        .drag-handle { color: #D5C9BE; cursor: grab; font-size: 20px; user-select: none; }

        /* ================= 主要計算機 ================= */
        .main-container { display: flex; gap: 25px; width: 100%; max-width: 900px; flex-wrap: wrap; justify-content: center; margin-top: 50px; transition: all 0.3s ease; }
        body.force-mobile .main-container { flex-direction: column !important; align-items: center !important; max-width: 450px !important; }
        body.force-desktop .main-container { flex-direction: row !important; flex-wrap: nowrap !important; max-width: 900px !important; align-items: flex-start !important; }
        .calculator, .result { background: #ffffff; padding: 35px; border-radius: 12px; box-shadow: var(--box-shadow); flex: 1; min-width: 320px; box-sizing: border-box; }
        h2, h3 { text-align: center; margin-top: 0; color: var(--brand-text); width: 100%; font-size: 24px; font-weight: 800; margin-bottom: 25px; }
        h2::before, h3::before { content: "▫️ "; font-size: 14px; color: var(--brand-primary); }
        @media (max-width: 480px) { h2 { font-size: 20px !important; white-space: nowrap !important; letter-spacing: -0.5px; } }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14.5px; color: var(--brand-text); }
        input[type="number"], select, input[type="text"] { width: 100%; padding: 12px; border: 1px solid #E0D8D0; border-radius: 6px; box-sizing: border-box; font-size: 16px; height: 46px; background-color: #FCFAFA; }
        .option-group { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: nowrap !important; }
        .option-label { font-weight: normal; display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 14px; white-space: nowrap; }
        input[type="radio"], .round-checkbox { width: 18px; height: 18px; accent-color: var(--brand-primary); cursor: pointer; appearance: none; -webkit-appearance: none; border: 1px solid #ccc; border-radius: 50%; background: #fff; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
        input[type="radio"]:checked, .round-checkbox:checked { background: var(--brand-primary); border-color: var(--brand-primary); }
        input[type="radio"]:checked::after, .round-checkbox:checked::after { content: ""; width: 8px; height: 8px; background: #fff; border-radius: 50%; display: block; }
        .inline-calc-container { display: flex; align-items: center; gap: 8px; width: 100%; }
        .inline-calc-result { color: var(--brand-primary); font-weight: bold; white-space: nowrap; font-size: 15px; }

        @keyframes resultFlash {
            0% { transform: scale(0.97); opacity: 0.8; }
            50% { transform: scale(1.03); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .result-animate { animation: resultFlash 0.4s ease-out; }
        .primary-btn { width: 100%; padding: 15px; background-color: var(--brand-primary); color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.2s; }
        .primary-btn:active { transform: scale(0.96); }
        .primary-btn:hover { background-color: var(--brand-primary-hover); }

        .result { border: 2px solid var(--brand-primary); position: relative; }
        .result.waiting { opacity: 0.4; filter: grayscale(1); border-color: #E0D8D0; }
        .result p { margin: 16px 0; display: flex; justify-content: space-between; font-size: 16px; }
        .total-price { font-size: 24px; font-weight: bold; color: var(--brand-primary) !important; }
        .save-section { margin-top: auto; padding-top: 25px; border-top: 2px dashed #E0E0E0; display: flex; flex-direction: column; gap: 12px; }
        .save-btn { width: 100%; padding: 12px; background-color: var(--brand-text); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .save-btn:disabled { background-color: #E0E0E0; color: #A0A0A0; cursor: not-allowed; }

        .hidden-box { display: none !important; }
        @media (max-width: 900px) { .main-container { flex-direction: column; max-width: 450px; } }
    </style>
</head>
<body class="theme-kr">

    <div id="app-kr" class="app-container active">
        <button class="view-switch-btn" id="viewSwitchBtn_kr" onclick="toggleViewMode_kr()">💻 電腦版</button>
        <button class="toggle-sidebar-btn" id="historyBtn_kr" onclick="toggleSidebar_kr()">☰</button>
        <div class="page-layout">
            <div class="sidebar" id="sidebar_kr">
                <div class="sidebar-header"><h3>OLANA</h3><span class="close-btn" onclick="toggleSidebar_kr()">✖</span></div>
                <div class="saved-list-container" id="savedList_kr"></div>
                <p id="emptyMsg_kr" style="color: #9A8C7F; font-size: 14px; text-align: center; margin-top: 30px;">目前尚無紀錄</p>
            </div>
            <div class="sidebar-spacer" id="sidebarSpacer_kr"></div>
            <div class="main-container">
                <div class="calculator">
                    <h2>OLANA 嚴選代購</h2>
                    
                    <div class="input-group">
                        <label>1. 商品幣別</label>
                        <div style="display: flex; gap: 8px;">
                            <select id="currency_kr" onchange="toggleCustomRate_kr()" style="flex: 1;">
                                <option value="42">韓幣 ₩ : 青瓦台 韓幣原價÷42</option>
                                <option value="43">韓幣 ₩ : 歐膩買手 韓幣原價÷43</option>
                                <option value="custom">自訂匯率⚙️</option>
                            </select>
                            <select id="kr_extra_fee" onchange="calculateItemPrice_kr()" style="flex: 1; display: none;">
                                <option value="" disabled selected>請選擇</option>
                                <option value="1.10">線下統一 +10%</option>
                                <option value="1.02">線上買 +2%</option>
                                <option value="1.03">線上要搶 +3%</option>
                            </select>
                        </div>
                        <div id="customRateContainer_kr" style="display: none; margin-top: 10px;">
                            <input type="number" id="customRate_kr" placeholder="輸入匯率" oninput="calculateItemPrice_kr()" inputmode="decimal">
                        </div>
                    </div>
                    
                    <div class="input-group"><label id="priceLabel_kr">2. 商品原價 (₩)</label><div class="inline-calc-container"><input type="number" id="price_kr" placeholder="輸入韓幣原價" oninput="calculateItemPrice_kr()" inputmode="decimal"><span id="itemPriceDisplay_kr" class="inline-calc-result">= 0 元</span></div></div>
                    <div class="input-group">
                        <label>3. 利潤</label>
                        <div class="option-group">
                            <label class="option-label"><input type="radio" name="feeType_kr" value="percent" checked> 按比例 (%)</label>
                            <label class="option-label"><input type="radio" name="feeType_kr" value="fixed"> 固定台幣</label>
                        </div>
                        <input type="number" id="serviceFee_kr" placeholder="輸入比例 或 固定金額" inputmode="decimal">
                    </div>
                    <div class="input-group"><label>4. 商品重量 (g)</label><div class="inline-calc-container"><input type="number" id="weight_kr" placeholder="商品重量" oninput="calculateWeightFee_kr()" inputmode="decimal"><span id="weightFeeDisplay_kr" class="inline-calc-result">= 0 元</span></div><span style="font-size: 12px; color: #A0A0A0; margin-top: 5px; display: block;">預估國際運費：克重 × 0.19</span></div>
                    <div class="input-group"><label>5. 台灣運費</label><select id="localShipping_kr"><option value="60">7-11 店到店 60</option><option value="40">郵局(小) 40</option><option value="80">郵局(大) 80</option></select></div>
                    <button class="primary-btn" onclick="calculateTotal_kr()">立即計算總價</button>
                </div>
                <div class="result waiting" id="resultBox_kr">
                    <h3>📝 報價明細 (台幣)</h3>
                    <p><span id="resItemPriceLabel_kr">商品折合台幣：</span> <span id="resItemPrice_kr">0 元</span></p>
                    <p><span>國際運費：</span> <span id="resIntlShipping_kr">0 元</span></p>
                    <p><span>台灣運費：</span> <span id="resLocalShipping_kr">0 元</span></p>
                    <p><span>利潤：</span> <span id="resServiceFee_kr">0 元</span></p>
                    <hr>
                    <p class="cost-price" style="font-size: 18px; font-weight: bold;"><span>成本：</span> <span id="resCost_kr">0 元</span></p>
                    <p class="total-price"><span>賣價：</span> <span id="resTotal_kr">0 元</span></p>
                    <div class="save-section"><input type="text" id="quoteName_kr" placeholder="儲存報價名稱"><button class="save-btn" id="saveBtn_kr" onclick="saveToSidebar_kr()" disabled>💾 儲存至記事本</button></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzUzXG8Bp0Xb725QtcZHwht89P-N8JceKHnpyHg6UAVr7WmPnw6OBVLenQ7RcYC_z5n/exec";
        let isSyncLocked = false;

        function syncToCloud(mode, dataArray) {
            isSyncLocked = true; 
            fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ mode: mode, data: dataArray }),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            }).then(() => {
                setTimeout(() => { isSyncLocked = false; }, 4000);
            }).catch(err => { 
                console.log("雲端同步失敗", err);
                isSyncLocked = false;
            });
        }

        let lastScrollTop = 0;
        window.addEventListener('scroll', () => {
            let st = window.pageYOffset || document.documentElement.scrollTop;
            const historyBtnKr = document.getElementById('historyBtn_kr');
            const viewBtnKr = document.getElementById('viewSwitchBtn_kr');
            if (st > 10) { viewBtnKr.classList.add('top-hidden'); } else { viewBtnKr.classList.remove('top-hidden'); }
            if (st > lastScrollTop && st > 50) { historyBtnKr.classList.add('scroll-hidden'); } else if (st < lastScrollTop) { historyBtnKr.classList.remove('scroll-hidden'); }
            lastScrollTop = st <= 0 ? 0 : st;
        }, { passive: true });

        function toggleCustomRate_kr() {
            const val = document.getElementById('currency_kr').value;
            const isCustom = val === 'custom';
            document.getElementById('customRateContainer_kr').style.display = isCustom ? 'block' : 'none';
            
            // 只有選擇 43 歐膩買手時，才顯示右側選單
            const extraFeeEl = document.getElementById('kr_extra_fee');
            extraFeeEl.style.display = (val === '43') ? 'block' : 'none';
            if (val !== '43') {
                extraFeeEl.value = ""; // 隱藏時重置為預設
            }
            
            localStorage.setItem('olanaRateType', val);
            calculateItemPrice_kr();
        }
        
        function calculateItemPrice_kr() {
            const price = parseFloat(document.getElementById('price_kr').value) || 0;
            const rateType = document.getElementById('currency_kr').value;
            const customInput = document.getElementById('customRate_kr');
            const rate = rateType === 'custom' ? (parseFloat(customInput.value) || 1) : parseFloat(rateType);
            if(rateType === 'custom') { localStorage.setItem('olanaCustomRate', customInput.value); }
            
            // 確保只有選中 43 時才會套用右側附加 % 數
            const extraFeeMultiplier = rateType === '43' ? (parseFloat(document.getElementById('kr_extra_fee').value) || 1) : 1;
            
            document.getElementById('itemPriceDisplay_kr').innerText = '= ' + Math.round((price / rate) * extraFeeMultiplier) + ' 元';
        }
        
        function calculateWeightFee_kr() {
            const weight = parseFloat(document.getElementById('weight_kr').value) || 0;
            document.getElementById('weightFeeDisplay_kr').innerText = '= ' + Math.round(weight * 0.19) + ' 元';
        }
        
        function calculateTotal_kr() {
            const price = parseFloat(document.getElementById('price_kr').value) || 0;
            const rateType = document.getElementById('currency_kr').value;
            const extraFeeEl = document.getElementById('kr_extra_fee');
            
            // 防呆機制：若選了 43 但未選擇附加費率，則阻擋計算並提示
            if (rateType === '43' && !extraFeeEl.value) {
                alert("防呆提示：請選擇附加費率 (線下/線上)！");
                return;
            }
            
            const rate = rateType === 'custom' ? (parseFloat(document.getElementById('customRate_kr').value) || 1) : parseFloat(rateType);
            const feeType = document.querySelector('input[name="feeType_kr"]:checked').value;
            const serviceInput = parseFloat(document.getElementById('serviceFee_kr').value) || 0;
            const weight = parseFloat(document.getElementById('weight_kr').value) || 0;
            const local = parseFloat(document.getElementById('localShipping_kr').value) || 0;
            
            // 確保只有選中 43 時才會套用右側附加 % 數
            const extraFeeMultiplier = rateType === '43' ? (parseFloat(extraFeeEl.value) || 1) : 1;
            
            let itemTWD = Math.round((price / rate) * extraFeeMultiplier);
            let intlTWD = Math.round(weight * 0.19);
            let serviceTWD = (feeType === 'percent') ? Math.round(itemTWD * (serviceInput / 100)) : serviceInput;
            const cost = itemTWD + intlTWD + local;
            const total = cost + serviceTWD;
            
            // 動態更新報價明細標題
            let labelText = "商品折合台幣：";
            if (rateType === '43') {
                labelText = `商品折合台幣 (${extraFeeEl.options[extraFeeEl.selectedIndex].text})：`;
            } else if (rateType === '42') {
                labelText = `商品折合台幣 (青瓦台)：`;
            } else {
                labelText = `商品折合台幣 (自訂匯率)：`;
            }
            document.getElementById('resItemPriceLabel_kr').innerText = labelText;
            
            document.getElementById('resItemPrice_kr').innerText = itemTWD + ' 元';
            document.getElementById('resIntlShipping_kr').innerText = intlTWD + ' 元';
            document.getElementById('resLocalShipping_kr').innerText = local + ' 元';
            document.getElementById('resServiceFee_kr').innerText = serviceTWD + ' 元';
            document.getElementById('resCost_kr').innerText = cost + ' 元';
            document.getElementById('resTotal_kr').innerText = total + ' 元';
            document.getElementById('resultBox_kr').classList.remove('waiting');
            document.getElementById('saveBtn_kr').disabled = false;
            const resBox = document.getElementById('resultBox_kr');
            resBox.classList.remove('result-animate');
            void resBox.offsetWidth; resBox.classList.add('result-animate');
            setTimeout(() => { resBox.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 100);
            
            // 每算一次要選一次防呆機制：算完後將下拉選單重置為空白
            if (rateType === '43') {
                extraFeeEl.value = "";
                calculateItemPrice_kr(); // 更新行內預覽
            }
        }

        function toggleViewMode_kr() {
            const btn = document.getElementById('viewSwitchBtn_kr');
            if (btn.innerHTML.includes('手機版')) {
                document.body.classList.remove('force-desktop'); document.body.classList.add('force-mobile');
                document.getElementById('viewportMeta').setAttribute('content', 'width=device-width, initial-scale=1.0');
                btn.innerHTML = '💻 電腦版';
            } else {
                document.body.classList.add('force-desktop'); document.body.classList.remove('force-mobile');
                document.getElementById('viewportMeta').setAttribute('content', 'width=1100');
                btn.innerHTML = '📱 手機版';
            }
        }

        /* -------------------------------------------
            核心修改：垂直切齊佈局與利潤顯示
        ------------------------------------------- */
        
        function getProfit(costStr, totalStr) {
            const c = parseInt(costStr.replace(/[^0-9]/g, '')) || 0;
            const t = parseInt(totalStr.replace(/[^0-9]/g, '')) || 0;
            return t - c;
        }

        function updateProfitDisplay(el) {
            const card = el.closest('.saved-item');
            const costStr = card.querySelector('.quote-cost').textContent;
            const totalStr = card.querySelector('.quote-total').textContent;
            const profitVal = getProfit(costStr, totalStr);
            card.querySelector('.quote-profit-val').textContent = profitVal;
        }

        function saveToSidebar_kr() {
            const name = document.getElementById('quoteName_kr').value.trim();
            if(!name) return alert("請輸入報價名稱");
            const id = 'save_kr_' + Date.now();
            renderSavedItem_kr(id, name, "成本："+document.getElementById('resCost_kr').innerText, "賣價："+document.getElementById('resTotal_kr').innerText, true);
            document.getElementById('emptyMsg_kr').style.display = 'none';
            document.getElementById('quoteName_kr').value = '';
            if (!document.getElementById('sidebar_kr').classList.contains('open')) toggleSidebar_kr();
            document.getElementById('saveBtn_kr').disabled = true;
            saveOrderToStorage_kr();
        }

        function renderSavedItem_kr(id, name, cost, total, prepend) {
            const profit = getProfit(cost, total);
            const div = document.createElement('div'); div.className = 'saved-item'; div.id = id;
            div.innerHTML = `
                <div class="drag-handle">☰</div>
                <div class="item-content">
                    <div class="item-title-row">
                        <strong class="editable-text quote-name" contenteditable="true" onblur="saveOrderToStorage_kr()" onkeydown="handleEnter(event)">${name}</strong>
                        <div class="item-action-btns">
                            <span class="copy-btn" onclick="copyItem('${id}')">📄</span>
                            <span class="del-btn" onclick="deleteItem_kr('${id}')">✖</span>
                        </div>
                    </div>
                    <div class="item-price-row">
                        <span class="editable-text quote-cost" contenteditable="true" oninput="updateProfitDisplay(this)" onblur="saveOrderToStorage_kr()" onkeydown="handleEnter(event)">${cost}</span>
                        <div class="sell-profit-group">
                            <span class="editable-text quote-total" contenteditable="true" oninput="updateProfitDisplay(this)" onblur="saveOrderToStorage_kr()" onkeydown="handleEnter(event)">${total}</span>
                            <span class="quote-profit-label">利潤：<span class="quote-profit-val">${profit}</span></span>
                        </div>
                    </div>
                </div>`;
            const list = document.getElementById('savedList_kr');
            if(prepend) list.insertBefore(div, list.firstChild); else list.appendChild(div);
        }

        function toggleSidebar_kr() { document.getElementById('sidebar_kr').classList.toggle('open'); document.getElementById('sidebarSpacer_kr').classList.toggle('open'); document.getElementById('historyBtn_kr').classList.toggle('hidden'); }
        
        function deleteItem_kr(id) { document.getElementById(id).remove(); if(document.querySelectorAll('#app-kr .saved-item').length === 0) document.getElementById('emptyMsg_kr').style.display = 'block'; saveOrderToStorage_kr(); }
        
        function saveOrderToStorage_kr() {
            setTimeout(() => {
                const items = [];
                document.querySelectorAll('#app-kr .saved-item').forEach(el => { 
                    items.push({ id: el.id, name: el.querySelector('.quote-name').textContent, cost: el.querySelector('.quote-cost').textContent, total: el.querySelector('.quote-total').textContent }); 
                });
                localStorage.setItem('olanaQuotes', JSON.stringify(items));
                syncToCloud('kr', items); 
            }, 0);
        }
        
        function copyItem(id) {
            const el = document.getElementById(id);
            const text = `${el.querySelector('.quote-name').textContent}\n${el.querySelector('.quote-cost').textContent}\n${el.querySelector('.quote-total').textContent}`;
            navigator.clipboard.writeText(text).then(() => alert('已複製報價！'));
        }

        let isTypingIME = false;
        document.addEventListener('compositionstart', () => { isTypingIME = true; });
        document.addEventListener('compositionend', () => { isTypingIME = false; });
        function handleEnter(e) { if (isTypingIME || e.isComposing || e.keyCode === 229) return; if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); } }

        function fetchCloudDataBackground() {
            if (isSyncLocked) return;
            fetch(API_URL + "?t=" + new Date().getTime(), { cache: 'no-store' })
                .then(res => res.json())
                .then(data => {
                    if (isSyncLocked) return;
                    const isEditing = document.activeElement && document.activeElement.classList.contains('editable-text');
                    if (data.kr) {
                        const newKrStr = JSON.stringify(data.kr);
                        const oldKrStr = localStorage.getItem('olanaQuotes') || '[]';
                        if (newKrStr !== oldKrStr && !isEditing) {
                            localStorage.setItem('olanaQuotes', newKrStr);
                            document.getElementById('savedList_kr').innerHTML = ''; 
                            data.kr.forEach(q => renderSavedItem_kr(q.id, q.name, q.cost, q.total, false));
                            document.getElementById('emptyMsg_kr').style.display = data.kr.length > 0 ? 'none' : 'block';
                        }
                    }
                })
                .catch(err => console.log("背景更新維持本機", err));
        }

        window.addEventListener('DOMContentLoaded', () => {
            if (window.innerWidth > 900) {
                document.body.classList.add('force-desktop');
                document.getElementById('viewportMeta').setAttribute('content', 'width=1100');
                document.getElementById('viewSwitchBtn_kr').innerHTML = '📱 手機版';
            }
            const krData = JSON.parse(localStorage.getItem('olanaQuotes') || '[]');
            krData.forEach(q => renderSavedItem_kr(q.id, q.name, q.cost, q.total, false));
            if(krData.length > 0) document.getElementById('emptyMsg_kr').style.display = 'none';
            
            const rateKrType = localStorage.getItem('olanaRateType');
            const customKrVal = localStorage.getItem('olanaCustomRate');
            if(rateKrType) { document.getElementById('currency_kr').value = rateKrType; }
            if(customKrVal) { document.getElementById('customRate_kr').value = customKrVal; }
            toggleCustomRate_kr();
            fetchCloudDataBackground();
            setInterval(fetchCloudDataBackground, 5000);
        });

        document.addEventListener('keydown', (e) => {
            if (isTypingIME || e.isComposing || e.keyCode === 229) return;
            if (e.key === 'Enter') {
                const activeEl = document.activeElement;
                if (activeEl.classList.contains('editable-text')) return;
                if(activeEl.id === 'quoteName_kr') { 
                    if(!document.getElementById('saveBtn_kr').disabled) saveToSidebar_kr(); 
                } else { 
                    calculateTotal_kr(); 
                } 
            }
        });
    </script>
</body>
</html>
